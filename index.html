<!doctype html>
<html lang="en">

  <title>RISPERIDONE - The Red Static</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020203;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }

    #renderCanvas {
      position: fixed;
      inset: 0;

      height: 100vh;
      display: block;
      outline: none;

      inset: 0;

      height: 100vh;

      mix-blend-mode: screen;
      transition: opacity 80ms linear, transform 80ms linear;

          rgba(0,0,0,0.92) 100%);

    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;

      backdrop-filter: blur(2px);
      box-shadow: 0 0 60px rgba(0,0,0,0.35);
      border-radius: 16px;

    }

    .title {

    .sub {

      left: 16px;

    #goalText.warning {

    #runText {

    @keyframes uiJitter {
      0%, 100% { transform: translate(0, 0); }

<body>
  <canvas id="renderCanvas"></canvas>
  <canvas id="noiseCanvas"></canvas>
  <canvas id="redNoiseCanvas"></canvas>
  <div id="flashOverlay"></div>

  <!-- Audio placeholders -->
  <audio id="ambienceAudio" src="audio/ambience.mp3" loop preload="auto"></audio>
  <audio id="heartbeatAudio" src="audio/heartbeat.mp3" loop preload="auto"></audio>
  <audio id="whispersAudio" src="Boom.wav" preload="auto"></audio>
  <audio id="chaseAudio" src="audio/chase.mp3" loop preload="auto"></audio>
  <audio id="jumpAudio" src="audio/jumpscare.mp3" preload="auto"></audio>
  <audio id="humAudio" src="Pickup.wav" loop preload="auto"></audio>

  <div id="vignette"></div>
  <div id="scanlines"></div>

  <div id="ui">
    <div class="panel">
      <div class="title">RISPERIDONE - The Red Static</div>
      <div class="sub" id="subtitle">Click to lock the cursor and enter.</div>
      <div class="meta">WASD to move • Mouse to look • V to sprint • E to use medicine</div>
    </div>
  </div>

  <div id="timerText">00:00</div>
  <div id="goalText">GOAL: SURVIVE 2 AND A HALF MINUTES</div>

  <div id="inventoryUI">
    <div id="inventoryItems"></div>
  </div>

  <div id="runText">RUN</div>
  <div id="blackoutScreen"></div>

  <div id="gameOverScreen">
    <div class="game-over-panel">
      <div class="game-over-title">They dragged you to Hell</div>
      <div class="game-over-stats" id="gameOverStats">
        The Death Angels brought your soul for the blood of theirs.<br>
        <span id="finalTime">Time: 00:00</span>
      </div>
      <button class="game-over-button" onclick="location.reload()">RESTART</button>
    </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
const canvas = document.getElementById("renderCanvas");
const noiseCanvas = document.getElementById("noiseCanvas");
const noiseCtx = noiseCanvas.getContext("2d");
const redNoiseCanvas = document.getElementById("redNoiseCanvas");
const redNoiseCtx = redNoiseCanvas.getContext("2d");
const ui = document.getElementById("ui");
const subtitle = document.getElementById("subtitle");
const timerText = document.getElementById("timerText");
const goalText = document.getElementById("goalText");
const runText = document.getElementById("runText");
const gameOverScreen = document.getElementById("gameOverScreen");
const gameOverPanel = gameOverScreen.querySelector('.game-over-panel');
const gameOverTitle = gameOverPanel.querySelector('.game-over-title');
const gameOverStats = document.getElementById("gameOverStats");
const finalTimeText = document.getElementById("finalTime");
const inventoryUI = document.getElementById("inventoryItems");
const blackoutScreen = document.getElementById("blackoutScreen");
const gameOverButton = gameOverPanel.querySelector('.game-over-button');
const flashOverlay = document.getElementById("flashOverlay");

const audio = {
  ambience: document.getElementById("ambienceAudio"),
  heartbeat: document.getElementById("heartbeatAudio"),
  whispers: document.getElementById("whispersAudio"),
  chase: document.getElementById("chaseAudio"),
  jump: document.getElementById("jumpAudio"),
  hum: document.getElementById("humAudio"),
};

let audioStarted = false;
let lastWhisperTime = 0;
let lastFlashTime = 0;
let lastSubChange = 0;

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;

  audio.ambience.volume = 0.28;
  audio.hum.volume = 0.05;
  audio.heartbeat.volume = 0;
  audio.chase.volume = 0;
  audio.whispers.volume = 0;

  audio.ambience.play().catch(() => {});
  audio.hum.play().catch(() => {});
}

function flashRed(strength = 1) {
  flashOverlay.classList.add("active");
  flashOverlay.style.opacity = String(Math.min(0.35, 0.08 + strength * 0.18));
  setTimeout(() => {
    flashOverlay.classList.remove("active");
    flashOverlay.style.opacity = "0";
  }, 85);
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

const engine = new BABYLON.Engine(canvas, true, {
  preserveDrawingBuffer: true,
  stencil: true,
  adaptToDeviceRatio: true
});

function resizeOverlays() {
  engine.resize();
}

window.addEventListener("resize", resizeOverlays);

const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.025, 1);
scene.collisionsEnabled = true;
scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
scene.fogColor = new BABYLON.Color3(0.08, 0.08, 0.085);
scene.fogDensity = 0.024;
scene.ambientColor = new BABYLON.Color3(0.09, 0.09, 0.1);
scene.gravity = new BABYLON.Vector3(0, -0.3, 0);

const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 2.35, 0), scene);
camera.attachControl(canvas, true);
camera.speed = 1.2;
camera.angularSensibility = 3800;
camera.inertia = 0.05;
camera.applyGravity = true;
camera.checkCollisions = true;
camera.ellipsoid = new BABYLON.Vector3(0.7, 1.8, 0.7);
camera.ellipsoidOffset = new BABYLON.Vector3(0, 0.9, 0);
camera.minZ = 0.05;
camera.keysUp = [87];
camera.keysDown = [83];
camera.keysLeft = [65];
camera.keysRight = [68];
scene.activeCamera = camera;

const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
hemi.intensity = 0.22;
hemi.diffuse = new BABYLON.Color3(0.9, 0.9, 0.95);
hemi.groundColor = new BABYLON.Color3(0.08, 0.08, 0.08);

const point = new BABYLON.PointLight("point", new BABYLON.Vector3(0, 6, 0), scene);
point.intensity = 0.18;
point.diffuse = new BABYLON.Color3(0.8, 0.8, 0.8);

const CELL_SIZE = 12;
const CHUNK_CELLS = 8;
const WALL_THICK = 0.55;
const WALL_H = 3.5;
const CHUNK_WORLD = CELL_SIZE * CHUNK_CELLS;
const RENDER_RADIUS = 3;

const floorMat = new BABYLON.StandardMaterial("floorMat", scene);
floorMat.diffuseColor = new BABYLON.Color3(0.02, 0.02, 0.02);
floorMat.specularColor = new BABYLON.Color3(0, 0, 0);

const wallMat = new BABYLON.StandardMaterial("wallMat", scene);
wallMat.diffuseColor = new BABYLON.Color3(0.52, 0.52, 0.54);
wallMat.specularColor = new BABYLON.Color3(0.08, 0.08, 0.08);

// Game state
let gameOver = false;
let gameWon = false;
let isSprinting = false;
const sprintDuration = 5000;
const sprintCooldown = 3000;
let sprintActive = false;
let lastSprintTime = 0;

// Goal system
const GOAL_TIME = 150000;
const HALLUCINATION_CYCLE = 60000;
const HALLUCINATION_ON_DURATION = 30000;
let hasVictoryMed = false;

// Inventory system
const inventory = {
  risperidone: {
    name: "Risperidone",
    lastUsed: -Infinity,
    cooldown: 35000,
    description: "Anti-Hallucination Med"
  },
  victoryMed: {
    name: "Final Remedy",
    lastUsed: -Infinity,
    cooldown: 0,
    description: "Ascension",
    isGolden: true
  }
};

function updateInventoryUI() {
  inventoryUI.innerHTML = '';
  for (const [key, item] of Object.entries(inventory)) {
    if (key === 'victoryMed' && !hasVictoryMed) continue;

    const timeSinceLastUse = performance.now() - item.lastUsed;
    const isOnCooldown = timeSinceLastUse < item.cooldown;

    const itemDiv = document.createElement('div');
    itemDiv.className = `inventory-item ${isOnCooldown ? 'disabled' : ''} ${item.isGolden ? 'golden' : ''}`;

    let statusText = '';
    if (key === 'victoryMed') {
      statusText = 'Press E to ascend';
    } else if (isOnCooldown) {
      const remainingSeconds = Math.ceil((item.cooldown - timeSinceLastUse) / 1000);
      statusText = `Cooldown: ${remainingSeconds}s`;
    } else {
      statusText = 'Press E to use';
    }

    itemDiv.innerHTML = `
      <div class="item-name ${item.isGolden ? 'golden' : ''}">${item.name}</div>
      <div class="item-status ${!isOnCooldown ? 'ready' : ''} ${item.isGolden ? 'golden' : ''}">
        ${statusText}
      </div>
    `;

    if (!isOnCooldown) {
      itemDiv.style.cursor = 'pointer';
      itemDiv.addEventListener('click', () => useItem(key));
    }

    inventoryUI.appendChild(itemDiv);
  }
}

function useItem(itemKey) {
  if (itemKey === 'victoryMed') {
    triggerVictory();
    return;
  }

  const item = inventory[itemKey];
  const timeSinceLastUse = performance.now() - item.lastUsed;
  if (timeSinceLastUse < item.cooldown) return;

  if (itemKey === 'risperidone') {
    item.lastUsed = performance.now();

    for (const monster of monsters) {
      monster.mesh.dispose(true);
    }
    monsters.length = 0;

    runText.classList.remove('active');
    runText.style.opacity = '0';
    subtitle.textContent = "The whispers fade.";

    if (!audio.heartbeat.paused) {
      audio.heartbeat.pause();
      audio.heartbeat.currentTime = 0;
    }
    if (!audio.chase.paused) {
      audio.chase.pause();
      audio.chase.currentTime = 0;
    }

    flashRed(0.4);
    updateInventoryUI();
  }
}

function hash2D(x, z, salt = 0) {
  let n = Math.imul(x | 0, 374761393) ^ Math.imul(z | 0, 668265263) ^ Math.imul(salt | 0, 1442695041);
  n = (n ^ (n >>> 13)) >>> 0;
  n = Math.imul(n, 1274126177) >>> 0;
  return (n ^ (n >>> 16)) >>> 0;
}

function edgeOpen(x, z, dir) {
  const h = hash2D(x, z, dir);
  return (h % 100) < 44 || (h % 13) === 0 || (((x ^ z) & 7) === 0 && (h % 100) < 72);
}

const chunks = new Map();
const monsters = [];

function makeKey(cx, cz) {
  return `${cx},${cz}`;
}

function createMergedWallsForChunk(cx, cz, root) {
  const baseCellX = cx * CHUNK_CELLS;
  const baseCellZ = cz * CHUNK_CELLS;
  const originX = baseCellX * CELL_SIZE;
  const originZ = baseCellZ * CELL_SIZE;

  for (let localX = 0; localX < CHUNK_CELLS; localX++) {
    let runStart = -1;
    for (let localZ = 0; localZ < CHUNK_CELLS; localZ++) {
      const worldX = baseCellX + localX;
      const worldZ = baseCellZ + localZ;
      const closed = !edgeOpen(worldX, worldZ, 1);
      if (closed && runStart < 0) runStart = localZ;
      const atEnd = localZ === CHUNK_CELLS - 1;
      if (runStart >= 0 && (!closed || atEnd)) {
        const runEnd = closed && atEnd ? localZ : localZ - 1;
        const length = runEnd - runStart + 1;
        if (length > 0) {
          const wall = BABYLON.MeshBuilder.CreateBox(
            `vw_${cx}_${cz}_${localX}_${runStart}_${runEnd}`,
            {
              width: WALL_THICK,
              height: WALL_H,
              depth: length * CELL_SIZE,
            },
            scene
          );
          wall.position.x = originX + (localX + 1) * CELL_SIZE;
          wall.position.y = WALL_H * 0.5;
          wall.position.z = originZ + (runStart + length * 0.5) * CELL_SIZE;
          wall.material = wallMat;
          wall.checkCollisions = true;
          wall.parent = root;
        }
        runStart = -1;
      }
    }
  }

  for (let localZ = 0; localZ < CHUNK_CELLS; localZ++) {
    let runStart = -1;
    for (let localX = 0; localX < CHUNK_CELLS; localX++) {
      const worldX = baseCellX + localX;
      const worldZ = baseCellZ + localZ;
      const closed = !edgeOpen(worldX, worldZ, 2);
      if (closed && runStart < 0) runStart = localX;
      const atEnd = localX === CHUNK_CELLS - 1;
      if (runStart >= 0 && (!closed || atEnd)) {
        const runEnd = closed && atEnd ? localX : localX - 1;
        const length = runEnd - runStart + 1;
        if (length > 0) {
          const wall = BABYLON.MeshBuilder.CreateBox(
            `hw_${cx}_${cz}_${localZ}_${runStart}_${runEnd}`,
            {
              width: length * CELL_SIZE,
              height: WALL_H,
              depth: WALL_THICK,
            },
            scene
          );
          wall.position.x = originX + (runStart + length * 0.5) * CELL_SIZE;
          wall.position.y = WALL_H * 0.5;
          wall.position.z = originZ + (localZ + 1) * CELL_SIZE;
          wall.material = wallMat;
          wall.checkCollisions = true;
          wall.parent = root;
        }
        runStart = -1;
      }
    }
  }
}

function createStaticTexture(name, size = 64, isRed = false) {
  const tex = new BABYLON.DynamicTexture(name, size, scene);
  const ctx = tex.getContext();
  const imgData = ctx.createImageData(size, size);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    const rand = Math.random();
    if (isRed) {
      data[i] = rand > 0.5 ? 220 : 60;
      data[i + 1] = rand > 0.6 ? 20 : 5;
      data[i + 2] = rand > 0.7 ? 20 : 5;
    } else {
      data[i] = rand > 0.5 ? 200 : 20;
      data[i + 1] = rand > 0.6 ? 20 : 10;
      data[i + 2] = rand > 0.7 ? 20 : 10;
    }
    data[i + 3] = 255;
  }

  ctx.putImageData(imgData, 0, 0);
  tex.update();
  return tex;
}

function createMonster(x, z) {
  const cloudMat = new BABYLON.StandardMaterial(`monsterMat_${Math.random()}`, scene);
  const staticTex = createStaticTexture(`staticTex_${Math.random()}`, 128, true);
  cloudMat.diffuseTexture = staticTex;
  cloudMat.emissiveColor = new BABYLON.Color3(0.6, 0.1, 0.1);
  cloudMat.specularColor = new BABYLON.Color3(0, 0, 0);

  const monster = BABYLON.MeshBuilder.CreateSphere(`monster_${x}_${z}`, { diameter: 3, segments: 8 }, scene);
  monster.position.x = x;
  monster.position.y = 3;
  monster.position.z = z;
  monster.material = cloudMat;
  monster.isVisible = true;

  const auraRings = [];
  for (let i = 0; i < 3; i++) {
    const auraMat = new BABYLON.StandardMaterial(`auraMat_${Math.random()}`, scene);
    const auraStaticTex = createStaticTexture(`auraStaticTex_${Math.random()}`, 64, true);
    auraMat.diffuseTexture = auraStaticTex;
    auraMat.emissiveColor = new BABYLON.Color3(0.8, 0.15, 0.15);
    auraMat.wireframe = false;

    const aura = BABYLON.MeshBuilder.CreateBox(
      `aura_${x}_${z}_${i}`,
      { size: 4 + i * 2 },
      scene
    );
    aura.parent = monster;
    aura.position.y = 0;
    aura.material = auraMat;
    aura.isVisible = true;
    auraRings.push(aura);
  }

  return {
    mesh: monster,
    auras: auraRings,
    x: x,
    z: z,
    targetX: x,
    targetZ: z,
    speed: 0.15 + Math.random() * 0.1,
    wobble: Math.random() * Math.PI * 2,
    glitchTimer: 0,
    staticTexture: staticTex
  };
}

function createChunk(cx, cz) {
  const root = new BABYLON.TransformNode(`chunkRoot_${cx}_${cz}`, scene);

  const floor = BABYLON.MeshBuilder.CreateGround(
    `floor_${cx}_${cz}`,
    {
      width: CHUNK_WORLD,
      height: CHUNK_WORLD,
      subdivisions: 1,
    },
    scene
  );
  floor.position.x = (cx + 0.5) * CHUNK_WORLD;
  floor.position.y = 0;
  floor.position.z = (cz + 0.5) * CHUNK_WORLD;
  floor.material = floorMat;
  floor.checkCollisions = true;
  floor.parent = root;

  createMergedWallsForChunk(cx, cz, root);
  chunks.set(makeKey(cx, cz), { root });
}

function disposeChunk(cx, cz) {
  const key = makeKey(cx, cz);
  const chunk = chunks.get(key);
  if (!chunk) return;
  chunk.root.dispose(false, true);
  chunks.delete(key);
}

function updateChunksAroundPlayer() {
  const cx = Math.floor(camera.position.x / CHUNK_WORLD);
  const cz = Math.floor(camera.position.z / CHUNK_WORLD);

  const needed = new Set();
  for (let dz = -RENDER_RADIUS; dz <= RENDER_RADIUS; dz++) {
    for (let dx = -RENDER_RADIUS; dx <= RENDER_RADIUS; dx++) {
      const x = cx + dx;
      const z = cz + dz;
      const key = makeKey(x, z);
      needed.add(key);
      if (!chunks.has(key)) createChunk(x, z);
    }
  }

  for (const key of chunks.keys()) {
    if (!needed.has(key)) {
      const [x, z] = key.split(",").map(Number);
      disposeChunk(x, z);
    }
  }
}

function updateMonsters(isHallucinationActive) {
  if (isHallucinationActive && monsters.length < 4 && Math.random() < 0.06) {
    const angle = Math.random() * Math.PI * 2;
    const distance = 25 + Math.random() * 35;
    const mx = camera.position.x + Math.cos(angle) * distance;
    const mz = camera.position.z + Math.sin(angle) * distance;
    monsters.push(createMonster(mx, mz));
  }

  let closestMonsterDist = Infinity;

  for (let i = monsters.length - 1; i >= 0; i--) {
    const monster = monsters[i];

    const towardsCamX = camera.position.x - monster.mesh.position.x;
    const towardsCamZ = camera.position.z - monster.mesh.position.z;
    const distToPlayer = Math.sqrt(towardsCamX * towardsCamX + towardsCamZ * towardsCamZ);

    closestMonsterDist = Math.min(closestMonsterDist, distToPlayer);

    if (distToPlayer > 2) {
      const moveAmount = monster.speed * 0.5;
      monster.mesh.position.x += (towardsCamX / distToPlayer) * moveAmount;
      monster.mesh.position.z += (towardsCamZ / distToPlayer) * moveAmount;
    } else {
      audio.jump.currentTime = 0;
      audio.jump.play().catch(() => {});
      triggerGameOver();
    }

    const shakeIntensity = 0.3 + 0.7;
    monster.mesh.position.x += (Math.random() - 0.5) * shakeIntensity;
    monster.mesh.position.y += (Math.random() - 0.5) * shakeIntensity * 0.5;
    monster.mesh.position.z += (Math.random() - 0.5) * shakeIntensity;

    monster.mesh.rotation.x += (Math.random() - 0.5) * 0.3;
    monster.mesh.rotation.y += (Math.random() - 0.5) * 0.3;
    monster.mesh.rotation.z += (Math.random() - 0.5) * 0.3;

    for (let j = 0; j < monster.auras.length; j++) {
      const aura = monster.auras[j];
      aura.isVisible = true;

      const glitchScale = 0.8 + Math.random() * 0.4;
      aura.scaling = new BABYLON.Vector3(glitchScale, glitchScale, glitchScale);

      aura.rotation.x += (Math.random() - 0.5) * 0.25;
      aura.rotation.y += (Math.random() - 0.5) * 0.25;
      aura.rotation.z += (Math.random() - 0.5) * 0.25;
    }

    if (Math.random() < 0.4) {
      const ctx = monster.staticTexture.getContext();
      const size = 128;
      const imgData = ctx.createImageData(size, size);
      const data = imgData.data;

      for (let k = 0; k < data.length; k += 4) {
        const rand = Math.random();
        data[k] = rand > 0.5 ? 220 : 60;
        data[k + 1] = rand > 0.6 ? 20 : 5;
        data[k + 2] = rand > 0.7 ? 20 : 5;
        data[k + 3] = 255;
      }
      ctx.putImageData(imgData, 0, 0);
      monster.staticTexture.update();
    }

    monster.mesh.isVisible = true;
  }

  if (!isHallucinationActive) {
    for (let i = monsters.length - 1; i >= 0; i--) {
      monsters[i].mesh.dispose(true);
      monsters.splice(i, 1);
    }
    runText.style.opacity = '0';
    if (!audio.chase.paused) {
      audio.chase.pause();
      audio.chase.currentTime = 0;
    }
  } else if (closestMonsterDist < 20 && monsters.length > 0) {
    runText.classList.add('active');
    runText.style.opacity = '1';
  } else {
    runText.classList.remove('active');
    runText.style.opacity = '0';
  }

  return closestMonsterDist;
}

function applyFearFX(closestMonsterDist, hallucination, now) {
  const fear = clamp01(1 - closestMonsterDist / 40);

  const shake = (fear * 10) + (hallucination * 4);
  const x = (Math.random() - 0.5) * shake;
  const y = (Math.random() - 0.5) * shake;

  canvas.style.transform = `translate(${x}px, ${y}px)`;
  noiseCanvas.style.transform = `translate(${x * 0.35}px, ${y * 0.35}px)`;
  redNoiseCanvas.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;

  camera.fov = 0.8 + fear * 0.08 + hallucination * 0.03;

  audio.ambience.volume = 0.18 + hallucination * 0.12;
  audio.hum.volume = 0.04 + hallucination * 0.12;

  audio.heartbeat.volume = fear * 0.65;
  if (fear > 0.03 && audio.heartbeat.paused) audio.heartbeat.play().catch(() => {});
  if (fear <= 0.02 && !audio.heartbeat.paused) {
    audio.heartbeat.pause();
    audio.heartbeat.currentTime = 0;
  }

  audio.chase.volume = fear * 0.55;
  if (fear > 0.45 && audio.chase.paused) audio.chase.play().catch(() => {});
  if (fear <= 0.35 && !audio.chase.paused) {
    audio.chase.pause();
    audio.chase.currentTime = 0;
  }

  if (hallucination > 0.5 && now - lastWhisperTime > 3500 + Math.random() * 4000) {
    lastWhisperTime = now;
    audio.whispers.currentTime = 0;
    audio.whispers.volume = 0.06 + Math.random() * 0.12;
    audio.whispers.play().catch(() => {});
  }

  if (closestMonsterDist < 8 && now - lastFlashTime > 900) {
    lastFlashTime = now;
    flashRed(1);
    document.getElementById("ui").classList.add("glitch");
    setTimeout(() => document.getElementById("ui").classList.remove("glitch"), 200);
  }
}

const skyBox = BABYLON.MeshBuilder.CreateBox("skyBox", { size: 2500 }, scene);
const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
skyMat.backFaceCulling = false;
skyMat.disableLighting = true;
skyMat.specularColor = new BABYLON.Color3(0, 0, 0);
skyMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
const skyTex = new BABYLON.DynamicTexture("skyTex", { width: 192, height: 192 }, scene, false);
skyMat.diffuseTexture = skyTex;
skyMat.diffuseTexture.coordinatesMode = BABYLON.Texture.SKYBOX_MODE;
skyBox.material = skyMat;
skyBox.infiniteDistance = true;

const startTime = performance.now();
let pointerLocked = false;
let lastChunkUpdate = 0;
let lastInventoryUpdate = 0;

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function drawStaticToTexture(level) {
  const tex = skyTex.getContext();
  const size = skyTex.getSize();
  const w = size.width;
  const h = size.height;

  const img = tex.createImageData(w, h);
  const data = img.data;
  const contrast = 40 + level * 60;
  const tint = 8 + level * 12;

  for (let i = 0; i < data.length; i += 4) {
    const base = Math.floor(Math.random() * 255);
    const g = clamp(base * (contrast / 255) + tint, 0, 255);
    data[i] = g;
    data[i + 1] = g;
    data[i + 2] = g;
    data[i + 3] = 255;
  }

  tex.putImageData(img, 0, 0);
  skyTex.update();
}

function resizeNoiseCanvas() {
  noiseCanvas.width = 256;
  noiseCanvas.height = 144;
  redNoiseCanvas.width = 256;
  redNoiseCanvas.height = 144;
}
resizeNoiseCanvas();

function drawOverlayNoise(level, t) {
  const w = noiseCanvas.width;
  const h = noiseCanvas.height;
  const img = noiseCtx.createImageData(w, h);
  const data = img.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = Math.random();
    const base = r < 0.5 ? 0 : 255;
    const drift = Math.floor((Math.sin(t * 0.003 + i * 0.00002) + 1) * 22);
    const v = clamp(base * 0.6 + drift + level * 55 + Math.random() * 35, 0, 255);
    data[i] = v;
    data[i + 1] = v;
    data[i + 2] = v;
    data[i + 3] = 255;
  }

  noiseCtx.putImageData(img, 0, 0);
  const opacity = 0.01 + level * 0.25;
  noiseCanvas.style.opacity = opacity.toFixed(3);
}

function drawRedNoise(level, t) {
  const w = redNoiseCanvas.width;
  const h = redNoiseCanvas.height;
  const img = redNoiseCtx.createImageData(w, h);
  const data = img.data;

  for (let i = 0; i < data.length; i += 4) {
    const rand = Math.random();
    const intensity = clamp(rand * 200 + level * 100, 0, 255);
    data[i] = intensity;
    data[i + 1] = intensity * 0.2;
    data[i + 2] = intensity * 0.1;
    data[i + 3] = 255;
  }

  redNoiseCtx.putImageData(img, 0, 0);
  redNoiseCanvas.style.opacity = (level * 0.3).toFixed(3);
}

function triggerGameOver() {
  if (gameOver || gameWon) return;
  gameOver = true;
  engine.stopRenderLoop();

  const elapsed = performance.now() - startTime;
  const minutes = Math.floor(elapsed / 60000);
  const seconds = Math.floor((elapsed % 60000) / 1000);

  finalTimeText.textContent = `Time Survived: ${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
  gameOverScreen.classList.add('show');
}

function triggerVictory() {
  if (gameOver || gameWon) return;
  gameWon = true;
  engine.stopRenderLoop();
  blackoutScreen.classList.add('active');

  setTimeout(() => {
    scene.clearColor = new BABYLON.Color4(1, 1, 1, 1);

    scene.meshes.slice().forEach(mesh => {
      if (mesh.name !== 'skyBox') {
        mesh.dispose();
      }
    });

    const platform = BABYLON.MeshBuilder.CreateBox("platform", { size: 50 }, scene);
    platform.position.y = -10;
    const platformMat = new BABYLON.StandardMaterial("platformMat", scene);
    platformMat.diffuseColor = new BABYLON.Color3(1, 1, 1);
    platformMat.emissiveColor = new BABYLON.Color3(0.9, 0.9, 0.9);
    platform.material = platformMat;

    const entity = BABYLON.MeshBuilder.CreateSphere("divineEntity", { diameter: 3, segments: 32 }, scene);
    entity.position.y = 2;
    entity.position.z = 10;
    const entityMat = new BABYLON.StandardMaterial("entityMat", scene);
    entityMat.emissiveColor = new BABYLON.Color3(1, 0.84, 0);
    entityMat.diffuseColor = new BABYLON.Color3(1, 0.84, 0);
    entity.material = entityMat;

    let animTime = 0;
    const animRender = () => {
      animTime += 0.016;
      entity.position.y = 2 + Math.sin(animTime * 0.5) * 0.3;
      entity.rotation.y += 0.01;
    };

    engine.runRenderLoop(() => {
      animRender();
      scene.render();
    });

    setTimeout(() => {
      engine.stopRenderLoop();

      gameOverPanel.classList.add('victory');
      gameOverTitle.classList.add('victory');
      gameOverTitle.textContent = 'The God saved you.';
      gameOverStats.classList.add('victory');
      gameOverStats.innerHTML = 'You have transcended the Death Angels.<br>Their static released you.';
      gameOverButton.classList.add('victory');
      gameOverScreen.classList.add('show');
      blackoutScreen.classList.remove('active');
    }, 3000);
  }, 2000);
}

function randomSubtitle(now) {
  if (now - lastSubChange < 5000) return;
  lastSubChange = now;

  const lines = [
    "The static is getting louder.",
    "Do not look behind you.",
    "Something is moving in the fog.",
    "The walls are listening.",
    "You are not alone.",
    "The hallucinations are beginning.",
    "The red light means it sees you.",
    "Run before it notices."
  ];
  subtitle.textContent = lines[Math.floor(Math.random() * lines.length)];
}

window.addEventListener("resize", () => {
  resizeOverlays();
  resizeNoiseCanvas();
});

window.addEventListener("keydown", (e) => {
  if (gameOver || gameWon) return;

  if (e.code === "KeyV") {
    if (!sprintActive && performance.now() - lastSprintTime > sprintCooldown) {
      sprintActive = true;
      lastSprintTime = performance.now();
      camera.speed = 2.4;
      document.getElementById("ui").classList.add("glitch");
      setTimeout(() => {
        sprintActive = false;
        camera.speed = 1.2;
        document.getElementById("ui").classList.remove("glitch");
      }, sprintDuration);
    }
    e.preventDefault();
  }

  if (e.code === "KeyE") {
    if (hasVictoryMed) {
      useItem('victoryMed');
    } else {
      useItem('risperidone');
    }
    e.preventDefault();
  }
});

scene.onPointerDown = () => {
  startAudio();
  if (document.pointerLockElement !== canvas) {
    canvas.requestPointerLock();
  }
};

document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === canvas;
  ui.classList.toggle("hidden", pointerLocked);
  subtitle.textContent = pointerLocked ? "You are inside." : "Click to lock the cursor and enter.";
});

resizeOverlays();
updateChunksAroundPlayer();
drawStaticToTexture(0);
drawOverlayNoise(0, performance.now());
updateInventoryUI();

engine.runRenderLoop(() => {
  if (gameOver || gameWon) return;

  const now = performance.now();
  const elapsed = now - startTime;

  if (elapsed >= GOAL_TIME && !hasVictoryMed) {
    hasVictoryMed = true;
    updateInventoryUI();
    goalText.textContent = '*** FINAL REMEDY ACQUIRED ***';
    goalText.classList.add('warning');
    flashRed(0.8);
  }

  const cyclePosition = (elapsed - 30000) % HALLUCINATION_CYCLE;
  const isHallucinationActive = elapsed >= 30000 && cyclePosition < HALLUCINATION_ON_DURATION;
  const hallucination = elapsed >= 30000 ? (isHallucinationActive ? 1 : 0) : 0;

  const flicker = Math.max(0, Math.sin(now * 0.008) * 0.25 + Math.sin(now * 0.021) * 0.15);
  const pulse = hallucination > 0.5 ? (flicker * hallucination) : 0;

  scene.fogDensity = 0.024 + hallucination * 0.045;
  hemi.intensity = 0.22 - hallucination * 0.08;
  point.intensity = 0.18 + hallucination * 0.05;

  if (hallucination > 0.5 && Math.random() < 0.06) {
    drawStaticToTexture(hallucination);
  }

  drawOverlayNoise(pulse, now);
  drawRedNoise(hallucination, now);

  const closestMonsterDist = updateMonsters(isHallucinationActive);
  applyFearFX(closestMonsterDist, hallucination, now);

  if (hallucination > 0.5 && Math.random() < 0.02) {
    flashRed(0.6);
  }

  if (hallucination > 0.5 && Math.random() < 0.01) {
    subtitle.textContent = [
      "It knows where you are.",
      "The walls are listening.",
      "Do not trust the red static."
    ][Math.floor(Math.random() * 3)];
  }

  randomSubtitle(now);

  if (now - lastInventoryUpdate > 100) {
    updateInventoryUI();
    lastInventoryUpdate = now;
  }

  const fade = 1 - hallucination * 0.12 - Math.max(0, Math.sin(now * 0.0021) * hallucination * 0.06);
  canvas.style.opacity = clamp(fade, 0.84, 1).toFixed(3);

  const camChunkX = Math.floor(camera.position.x / CHUNK_WORLD);
  const camChunkZ = Math.floor(camera.position.z / CHUNK_WORLD);

  if (now - lastChunkUpdate > 250) {
    updateChunksAroundPlayer();
    lastChunkUpdate = now;
  }

  const timeToGoal = GOAL_TIME - elapsed;
  if (timeToGoal > 0 && timeToGoal < 60000) {
    goalText.classList.add('warning');
  } else if (timeToGoal <= 0) {
    goalText.classList.add('warning');
  }

  timerText.textContent = `${Math.floor(elapsed / 60000)
    .toString()
    .padStart(2, "0")}:${Math.floor((elapsed % 60000) / 1000)
    .toString()
    .padStart(2, "0")}  |  ${camChunkX}, ${camChunkZ}`;

  skyBox.rotation.y += 0.0004;
  scene.render();
});
  </script>
